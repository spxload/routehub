name: RouteHub Node Check

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: routehub-node-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install "requests[socks]" geoip2

      - name: Download Xray-core
        run: |
          curl -sL -o xray.zip \
            https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o xray.zip xray
          chmod +x xray
          ./xray version

      - name: Download GeoLite2 (mirror, no key)
        run: |
          curl -sL -o GeoLite2-City.mmdb \
            https://github.com/P3TERX/GeoLite.mmdb/releases/latest/download/GeoLite2-City.mmdb
          curl -sL -o GeoLite2-ASN.mmdb \
            https://github.com/P3TERX/GeoLite.mmdb/releases/latest/download/GeoLite2-ASN.mmdb
          ls -la *.mmdb

      - name: Run RouteHub server
        env:
          SUBSCRIPTION_URL: ${{ secrets.SUBSCRIPTION_URL }}
          SUB_HWID: ${{ secrets.SUB_HWID }}
          VERIFY_AI: ${{ vars.VERIFY_AI || '1' }}
        run: python routehub-server.py

      - name: Publish nodes to Gist
        env:
          SUBSCRIPTION_URL: ${{ secrets.SUBSCRIPTION_URL }}
          SUB_HWID: ${{ secrets.SUB_HWID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: python publish_nodes.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add routehub-ratings.json routehub-history.json
          if git diff --staged --quiet; then
            echo "Изменений нет"
          else
            git commit -m "Update ratings $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
