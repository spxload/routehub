name = "routehub"
main = "routehub-worker.js"
compatibility_date = "2026-06-01"

# Worker v1.1.0: KV — единственное хранилище (sub_cache, devices, metrics:<kN>).
# Секреты Cloudflare (тип Secret, НЕ Text — plaintext-переменные стираются
# каждым деплоем из этого файла): SUBSCRIPTION_URL, SUB_HWID.
# Гист/GitHub Actions/publish_nodes.py больше не используются.
# cron — фоновое обновление подписки в KV раз в 2 часа.

[triggers]
crons = ["0 */2 * * *"]

[[kv_namespaces]]
binding = "RH_KV"
id = "fd80cc3ca9b344109e5f203f9b345f37"

[vars]
CONFIG_URL = "https://raw.githubusercontent.com/spxload/routehub/main/routehub.conf"
