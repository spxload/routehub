# =============================================================
# RouteHub — ЧЕРНОВИК конфига (routehub-draft.conf)
# ЭТО НЕ ЖИВОЙ КОНФИГ. Живой — routehub.conf (его отдаёт Worker /config).
# Назначение: черновик для адаптации Дианой. Когда «ок» — повысить в routehub.conf.
# База: C-draft-17 + РФ→DIRECT (forg-lib) + select-переключатели для теста whitelist.
# Версия: C-draft-18-draft (rev2), дата 2026-06-09.
#
# ИЗМЕНЕНИЯ ОТНОСИТЕЛЬНО C-draft-17:
#   1. Слой РФ→DIRECT доменными списками forg-lib + whitelist-ips, ВЫШЕ прокси-списков.
#      Доменные правила бьют GEOIP/FINAL, ловят РФ-сервисы на зарубежных CDN.
#   2. Apple → DIRECT (группа RH-Apple убрана), real-ip/skip-proxy для Apple сохранены.
#   3. Убран disable-udp-ports=443 (ломал FaceTime/звонки).
#   4. SELECT-ПЕРЕКЛЮЧАТЕЛИ ДЛЯ ТЕСТА WHITELIST:
#      RH-Прямой = select, DIRECT, RH-Обход — на него повешены GEOIP,RU / РФ-списки /
#        Apple / банки / DeepSeek. По умолчанию DIRECT. Под whitelist флипаешь ОДНУ
#        группу RH-Прямой → DIRECT меняется на обход для всего сразу (проверка).
#        В Этапе F это же будет флипать netwatch автоматически.
#      RH-Главный = select, RH-АВТО, DIRECT — FINAL указывает сюда. По умолчанию
#        RH-АВТО (как сейчас, proxy-default). Можно флипнуть на DIRECT для эксперимента
#        «direct по умолчанию». Под whitelist RH-АВТО сам уходит в обход (fallback-дети).
#   5. DNS: Яндекс НЕ в DoH-пул (риск отравления РКН для заблокированного). Оставлен
#      как plain-резерв (8.4): включается только если DoH не сработал (напр. под whitelist) —
#      тогда РФ-домены резолвятся корректно. RU-DIRECT работает по ИМЕНИ, не по резолверу.
#   6. + hijack-dns=*:53 (ловит свой DNS приложений → доменные правила срабатывают);
#      + domain-reject-mode=DNS (реклама режется на DNS-этапе); real-ip расширен.
#   7. Одна подписка + динамические AI-тиры (плейсхолдеры) — без изменений.
#
# АУДИТ СПИСКОВ:
#   ЯДРО: 3 РФ-DIRECT (overlap безвреден), apple, banking, refilter, Telegram.
#   ОПЦИЯ (можно убрать): Privacy/Privacy_Domain (блок рекламы), whitelist-ips (IP-резерв),
#     OverseasAI (локальные AI-правила уже ловят 5 сервисов; тянет Stripe/PayPal в RH-AI).
#
# ПРОВЕРИТЬ: Loon принимает .list forg-lib без ошибок парсинга; РФ-приложения не видят
#   прокси; forg-lib не тянет в DIRECT заблокированного; AI/звонки/YouTube целы;
#   под whitelist флип RH-Прямой → обход реально оживляет РФ-сервисы.
#
# ПРИМЕЧАНИЕ: ШАБЛОН. Плейсхолдеры # __RH_AI_FILTERS__ / # __RH_AI_GROUPS__ заполняет
# Worker, когда файл становится routehub.conf. Напрямую (мимо Worker) грузить нельзя.
# =============================================================

[General]
ip-mode = ipv4-only
allow-udp-proxy = true
udp-fallback-mode = REJECT
dns-server = system,1.1.1.1,77.88.8.8
doh-server = https://cloudflare-dns.com/dns-query,https://dns.google/dns-query
hijack-dns = *:53
domain-reject-mode = DNS
sni-sniffing = true
proxy-test-url = http://cp.cloudflare.com/generate_204
internet-test-url = http://www.msftconnecttest.com/connecttest.txt
test-timeout = 3
interface-mode = auto
disable-stun = false
real-ip = wpad.*,wpad,*.local,*.apple.com,*.icloud.com,time.*.com,ntp.*.com
skip-proxy = wpad.*,wpad,*.local,localhost,*.lan,*.localdomain,captive.apple.com
bypass-tun = 10.0.0.0/8,100.64.0.0/10,127.0.0.0/8,169.254.0.0/16,172.16.0.0/12,192.0.0.0/24,192.0.2.0/24,192.88.99.0/24,192.168.0.0/16,198.18.0.0/15,198.51.100.0/24,203.0.113.0/24,224.0.0.0/4,255.255.255.255/32
# disable-udp-ports — НЕ задаём (глушение UDP/443 ломало FaceTime/звонки).
# Яндекс DNS (77.88.8.8) — только plain-резерв, в doh-server НЕ добавлять (отравление РКН).

[Host]
# TikTok — маршрутизацией доменов (Этап J), без MITM/DNS-подмены.
# Опц.: точечный РФ-резолвинг через Яндекс — пример: *.gosuslugi.ru = server:77.88.8.8

[Remote Proxy]
Lastdep = https://routehub.proton4iker.workers.dev/nodes?key=k1,udp=true,enabled=true

[Remote Filter]
RH-Filter-W-VPN  = NameRegex, Lastdep, FilterKey = \[VPN\].*🛜
RH-Filter-C-VPN  = NameRegex, Lastdep, FilterKey = \[VPN\].*📱
RH-Filter-W-Игры = NameRegex, Lastdep, FilterKey = Игры.*🛜
RH-Filter-C-Игры = NameRegex, Lastdep, FilterKey = Игры.*📱
RH-Filter-Обход  = NameKeyword, Lastdep, FilterKey = Обход
# AI-тиеры — СТРОИТ Worker по числу узлов, DE первой
# __RH_AI_FILTERS__

[Proxy Group]
# Ручные / служебные
RH-Все = select, RH-Filter-W-VPN, RH-Filter-W-Игры, RH-Filter-Обход, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Static.png
RH-Обход = fallback, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=300, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Bypass.png
# Переключатель для теста whitelist: норм. = DIRECT, под whitelist флипнуть на RH-Обход
RH-Прямой = select, DIRECT, RH-Обход, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Direct.png
# Дефолт FINAL: норм. = RH-АВТО (proxy), флип на DIRECT — эксперимент «direct по умолчанию»
RH-Главный = select, RH-АВТО, DIRECT, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Final.png
# AI: родитель select (netwatch флипает) + дети fallback. Тиеры строит Worker.
# __RH_AI_GROUPS__
# Обычный трафик: основа (VPN) -> игры -> обход
RH-АВТО = select, RH-АВТО-W, RH-АВТО-C, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Auto.png
RH-АВТО-W = fallback, RH-Filter-W-VPN, RH-Filter-W-Игры, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=300
RH-АВТО-C = fallback, RH-Filter-C-VPN, RH-Filter-C-Игры, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=300
# Звонки: игры -> VPN -> обход
RH-Звонки = select, RH-Звонки-W, RH-Звонки-C, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Available.png
RH-Звонки-W = fallback, RH-Filter-W-Игры, RH-Filter-W-VPN, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=300
RH-Звонки-C = fallback, RH-Filter-C-Игры, RH-Filter-C-VPN, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=300

[Rule]
# Apple Push: DIRECT, под whitelist -> обход (через RH-Прямой)
IP-CIDR,17.0.0.0/8,RH-Прямой,no-resolve
# Локальные REJECT
IP-CIDR,224.0.0.0/4,REJECT,no-resolve
IP-CIDR,239.0.0.0/8,REJECT,no-resolve
# Звонки: STUN
PROTOCOL,STUN,RH-Звонки
# AI-сервисы -> RH-AI (локальные правила приоритетнее подписок)
DOMAIN-SUFFIX,openai.com,RH-AI
DOMAIN-SUFFIX,chatgpt.com,RH-AI
DOMAIN-SUFFIX,oaistatic.com,RH-AI
DOMAIN-SUFFIX,oaiusercontent.com,RH-AI
DOMAIN-SUFFIX,anthropic.com,RH-AI
DOMAIN-SUFFIX,claude.ai,RH-AI
DOMAIN-SUFFIX,gemini.google.com,RH-AI
DOMAIN-SUFFIX,bard.google.com,RH-AI
DOMAIN-SUFFIX,aistudio.google.com,RH-AI
DOMAIN-SUFFIX,generativelanguage.googleapis.com,RH-AI
DOMAIN-SUFFIX,x.ai,RH-AI
DOMAIN-SUFFIX,grok.com,RH-AI
DOMAIN-SUFFIX,perplexity.ai,RH-AI
# DeepSeek: DIRECT, под whitelist -> обход
DOMAIN-SUFFIX,deepseek.com,RH-Прямой
# YouTube / соцсети -> прокси
DOMAIN-SUFFIX,youtube.com,RH-АВТО
DOMAIN-SUFFIX,googlevideo.com,RH-АВТО
DOMAIN-SUFFIX,instagram.com,RH-АВТО
# Российские IP: DIRECT, под whitelist -> обход (fallback для непойманного доменами)
GEOIP,RU,RH-Прямой
# Всё прочее -> RH-Главный (по умолч. RH-АВТО)
FINAL,RH-Главный

[Remote Rule]
# --- Реклама/трекеры -> блок (ОПЦИЯ) ---
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Privacy/Privacy.list, policy=REJECT-DROP, tag=Реклама-трекеры, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Privacy/Privacy_Domain.list, policy=REJECT-DROP, tag=Реклама-домены, enabled=true
# --- РФ -> RH-Прямой (DIRECT норм. / обход под whitelist). ВЫШЕ прокси-списков ---
https://raw.githubusercontent.com/forg-lib-lov/roscomvpn-shadowrocket/main/lists/whitelist-domains.list, policy=RH-Прямой, tag=РФ-whitelist-домены, enabled=true
https://raw.githubusercontent.com/forg-lib-lov/roscomvpn-shadowrocket/main/lists/category-ru.list, policy=RH-Прямой, tag=РФ-сервисы, enabled=true
https://raw.githubusercontent.com/forg-lib-lov/roscomvpn-shadowrocket/main/lists/hxehex-whitelist.list, policy=RH-Прямой, tag=РФ-моб-whitelist, enabled=true
https://raw.githubusercontent.com/forg-lib-lov/roscomvpn-shadowrocket/main/lists/apple.list, policy=RH-Прямой, tag=Apple, enabled=true
https://raw.githubusercontent.com/forg-lib-lov/roscomvpn-shadowrocket/main/lists/whitelist-ips.list, policy=RH-Прямой, tag=РФ-whitelist-IP, enabled=true
https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/main/rules/banking.list, policy=RH-Прямой, tag=Банки-РФ, enabled=true
# --- AI catch-all (ОПЦИЯ; локальные AI-правила выше всё равно приоритетнее) ---
https://raw.githubusercontent.com/viewer12/OverseasAI.list/main/rule/Loon/OverseasAI/OverseasAI.list, policy=RH-AI, tag=AI-catch-all, enabled=true
# --- Прокси (заблокированное в РФ) ---
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Telegram/Telegram.list, policy=RH-АВТО, tag=Telegram, enabled=true
https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/main/rules/domains_refilter.list, policy=RH-АВТО, tag=Заблокировано-в-РФ, enabled=true

[URL Rewrite]

[Script]
cron "0 */20 * * * ?" script-path=routehub-speedtest.js, timeout=200, tag=RH-Speed, enabled=true
network-changed script-path=routehub-netwatch.js, timeout=120, tag=RH-Net, enabled=true

[Plugin]

[MITM]
enable = false
