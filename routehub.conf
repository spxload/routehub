# =============================================================
# RouteHub — главный конфиг (routehub.conf)
# Точка входа. Раздаётся ОДНОЙ живой ссылкой Worker (Loon Remote Config).
# Версия: C-draft-15, дата 2026-06-08.
#
# МОДЕЛЬ ДВУХ ПОДПИСОК (WiFi/Cell):
#   Две подписки LastdepW (&net=wifi) и LastdepC (&net=cell) всегда
#   загружены. Worker рендерит каждую под свою сеть (метка 🛜/📱 +
#   сортировка). Метка сети стоит на КАЖДОМ узле — имена различаются
#   между подписками, Loon их не схлопывает.
#
#   Разделение по сети — ИСТОЧНИКОМ фильтра (LastdepW / LastdepC), не иконкой.
#   Каждая функция — родитель select из двух fallback-детей (-W / -C).
#   netwatch при смене сети флипает родителя на нужного ребёнка
#   (setSelectPolicy по select-группе). Узел внутри выбирает fallback сам.
#
#   AI — страновые тиеры (C-draft-15): дети fallback идут
#     DE → (FI, PL) → (EE, NL, TR, US) → одиночные страны → обход.
#   Порядок реализован дедупом фильтров: Loon отсеивает из последующих
#   фильтров узлы, уже отданные предыдущими. Catch-all одиночных —
#   regex [VPN] без 🇷🇺 (DIRECT + мёртвые) и без 🇧🇾 (жив по связности,
#   но блокирует все 5 ИИ). Германия держится, пока жив хотя бы один
#   немецкий; при полном отказе DE — переход в следующую страну
#   (осознанный размен «доступность > строгий якорь»), возврат в DE
#   автоматически. Тиеры по числу узлов: после DE идём туда, где больше
#   узлов, — дольше держимся за счёт безопасных внутристрановых переключений.
#   ОГРАНИЧЕНИЕ: fallback проверяет связность (generate_204), не доступность
#   ИИ; узел, живой по связности но забанивший ИИ, может быть выбран.
#   Снижается порядком (рабочие страны впереди) и исключением RU/BY.
#
#   RH-Core / RH-Health ВЫКЛЮЧЕНЫ: выбор узла делает fallback, не скрипт.
#   netwatch (RH-Net) — только флип родителей + детект whitelist.
#
# ПРОВЕРИТЬ НА УСТРОЙСТВЕ:
#   * Loon держит ОБЕ подписки как разные узлы (≈148 в списке);
#   * фильтр с источником LastdepW отдаёт только wifi-набор;
#   * флип RH-AI -> RH-AI-C реально меняет активного ребёнка;
#   * порядок тиров в RH-AI-W: первым немецкий, дедуп не путает.
# =============================================================

[General]
ip-mode = ipv4-only
allow-udp-proxy = true
udp-fallback-mode = REJECT
dns-server = system,1.1.1.1,77.88.8.8
doh-server = https://cloudflare-dns.com/dns-query,https://dns.google/dns-query
sni-sniffing = true
proxy-test-url = http://cp.cloudflare.com/generate_204
internet-test-url = http://www.msftconnecttest.com/connecttest.txt
test-timeout = 3
interface-mode = auto
disable-udp-ports = 443
disable-stun = false
real-ip = wpad.*,wpad,*.local,*.apple.com,*.icloud.com
skip-proxy = wpad.*,wpad,*.local,localhost,*.lan,*.localdomain
bypass-tun = 10.0.0.0/8,100.64.0.0/10,127.0.0.0/8,169.254.0.0/16,172.16.0.0/12,192.0.0.0/24,192.0.2.0/24,192.88.99.0/24,192.168.0.0/16,198.18.0.0/15,198.51.100.0/24,203.0.113.0/24,224.0.0.0/4,255.255.255.255/32
# ssid-trigger — решение ВС (Этап E): НЕ добавляем (на всех сетях нужен RULE).

[Host]
# TikTok — маршрутизацией доменов (Этап J), БЕЗ MITM/DNS-подмены.

[Remote Proxy]
# Две подписки — Worker перепишет key/origin. Обе всегда enabled.
LastdepW = https://routehub.proton4iker.workers.dev/nodes?key=k1&net=wifi,udp=true,enabled=true
LastdepC = https://routehub.proton4iker.workers.dev/nodes?key=k1&net=cell,udp=true,enabled=true

[Remote Filter]
# Разделение по сети — ИСТОЧНИКОМ (LastdepW / LastdepC), не иконкой.
# --- WiFi-набор ---
# AI-тиеры (только [VPN], по флагу в имени):
RH-Filter-W-DE    = NameRegex, LastdepW, FilterKey = 🇩🇪.*\[VPN\]
RH-Filter-W-AI2   = NameRegex, LastdepW, FilterKey = (🇫🇮|🇵🇱).*\[VPN\]
RH-Filter-W-AI3   = NameRegex, LastdepW, FilterKey = (🇪🇪|🇳🇱|🇹🇷|🇺🇸).*\[VPN\]
RH-Filter-W-AIrest = NameRegex, LastdepW, FilterKey = ^(?!.*(🇷🇺|🇧🇾)).*\[VPN\]
# Общие (АВТО, звонки, ручной тест):
RH-Filter-W-VPN   = NameKeyword, LastdepW, FilterKey = [VPN]
RH-Filter-W-Игры  = NameKeyword, LastdepW, FilterKey = Игры
# --- Cell-набор ---
RH-Filter-C-DE    = NameRegex, LastdepC, FilterKey = 🇩🇪.*\[VPN\]
RH-Filter-C-AI2   = NameRegex, LastdepC, FilterKey = (🇫🇮|🇵🇱).*\[VPN\]
RH-Filter-C-AI3   = NameRegex, LastdepC, FilterKey = (🇪🇪|🇳🇱|🇹🇷|🇺🇸).*\[VPN\]
RH-Filter-C-AIrest = NameRegex, LastdepC, FilterKey = ^(?!.*(🇷🇺|🇧🇾)).*\[VPN\]
RH-Filter-C-VPN   = NameKeyword, LastdepC, FilterKey = [VPN]
RH-Filter-C-Игры  = NameKeyword, LastdepC, FilterKey = Игры
# Обход — общий (источник LastdepW достаточен)
RH-Filter-Обход = NameKeyword, LastdepW, FilterKey = Обход

[Proxy Group]
# --- AI: родитель select (netwatch флипает), дети fallback по страновым тирам.
#     DE -> (FI,PL) -> (EE,NL,TR,US) -> одиночные (catch-all без RU/BY) -> обход.
#     Дедуп между фильтрами обеспечивает порядок и неповторяемость узлов. ---
RH-AI-W = fallback, RH-Filter-W-DE, RH-Filter-W-AI2, RH-Filter-W-AI3, RH-Filter-W-AIrest, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=600
RH-AI-C = fallback, RH-Filter-C-DE, RH-Filter-C-AI2, RH-Filter-C-AI3, RH-Filter-C-AIrest, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=600
RH-AI = select, RH-AI-W, RH-AI-C, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/AI.png
# --- Обычный трафик: основа (VPN) → игры → обход. ---
RH-АВТО-W = fallback, RH-Filter-W-VPN, RH-Filter-W-Игры, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=300
RH-АВТО-C = fallback, RH-Filter-C-VPN, RH-Filter-C-Игры, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=300
RH-АВТО = select, RH-АВТО-W, RH-АВТО-C, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Auto.png
# --- Звонки: игры (низкая задержка) → VPN → обход. UDP у обхода не подтверждён — крайний резерв. ---
RH-Звонки-W = fallback, RH-Filter-W-Игры, RH-Filter-W-VPN, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=300
RH-Звонки-C = fallback, RH-Filter-C-Игры, RH-Filter-C-VPN, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=300
RH-Звонки = select, RH-Звонки-W, RH-Звонки-C, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Available.png
# --- Обходные узлы (whitelist РКН, Этап F) ---
RH-Обход = fallback, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=300, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Bypass.png
# --- Apple: по умолчанию напрямую, при проблемах — RH-АВТО ---
RH-Apple = select, DIRECT, RH-АВТО, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Apple.png
# --- РУЧНОЙ ТЕСТ: все узлы обеих сетей ---
RH-Все = select, RH-Filter-W-VPN, RH-Filter-W-Игры, RH-Filter-C-VPN, RH-Filter-C-Игры, RH-Filter-Обход, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Static.png

[Rule]
# Apple Push
IP-CIDR,17.0.0.0/8,RH-Apple,no-resolve
# Локальные REJECT
IP-CIDR,224.0.0.0/4,REJECT,no-resolve
IP-CIDR,239.0.0.0/8,REJECT,no-resolve
# Звонки: STUN
PROTOCOL,STUN,RH-Звонки
# AI-сервисы -> RH-AI
DOMAIN-SUFFIX,openai.com,RH-AI
DOMAIN-SUFFIX,chatgpt.com,RH-AI
DOMAIN-SUFFIX,oaistatic.com,RH-AI
DOMAIN-SUFFIX,oaiusercontent.com,RH-AI
DOMAIN-SUFFIX,anthropic.com,RH-AI
DOMAIN-SUFFIX,claude.ai,RH-AI
DOMAIN-SUFFIX,gemini.google.com,RH-AI
DOMAIN-SUFFIX,bard.google.com,RH-AI
DOMAIN-SUFFIX,aistudio.google.com,RH-AI
DOMAIN-SUFFIX,generativelanguage.googleapis.com,RH-AI
DOMAIN-SUFFIX,x.ai,RH-AI
DOMAIN-SUFFIX,grok.com,RH-AI
DOMAIN-SUFFIX,perplexity.ai,RH-AI
# DeepSeek — напрямую
DOMAIN-SUFFIX,deepseek.com,DIRECT
# YouTube / соцсети
DOMAIN-SUFFIX,youtube.com,RH-АВТО
DOMAIN-SUFFIX,googlevideo.com,RH-АВТО
DOMAIN-SUFFIX,instagram.com,RH-АВТО
# Российские IP -> напрямую
GEOIP,RU,DIRECT
# Всё прочее
FINAL,RH-АВТО

[Remote Rule]
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Privacy/Privacy.list, policy=REJECT-DROP, tag=Реклама-трекеры, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Privacy/Privacy_Domain.list, policy=REJECT-DROP, tag=Реклама-домены, enabled=true
https://raw.githubusercontent.com/viewer12/OverseasAI.list/main/rule/Loon/OverseasAI/OverseasAI.list, policy=RH-AI, tag=AI-catch-all, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Telegram/Telegram.list, policy=RH-АВТО, tag=Telegram, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Apple/Apple.list, policy=RH-Apple, tag=Apple, enabled=true
https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/main/rules/domains_refilter.list, policy=RH-АВТО, tag=Заблокировано-в-РФ, enabled=true
https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/main/rules/banking.list, policy=DIRECT, tag=Банки-РФ, enabled=true

[URL Rewrite]

[Script]
# RH-Core / RH-Health ВЫКЛЮЧЕНЫ — выбор узла делает fallback (модель двух подписок).
cron "0 */30 * * * ?" script-path=routehub-core.js, timeout=120, tag=RH-Core, enabled=false
cron "0 */5 * * * ?" script-path=routehub-health.js, timeout=90, tag=RH-Health, enabled=false
cron "0 */20 * * * ?" script-path=routehub-speedtest.js, timeout=200, tag=RH-Speed, enabled=true
# netwatch — флип родительских групп по сети + детект whitelist.
network-changed script-path=routehub-netwatch.js, timeout=120, tag=RH-Net, enabled=true
generic script-path=routehub-ai-bad.js, tag=RH-AI-плохо, enabled=true, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Reject.png
generic script-path=routehub-viewer.js, tag=RH-Просмотр, enabled=true, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Info.png

[Plugin]
# Плагины RouteHub — Этапы D+. BoxJs опц., выкл.

[MITM]
enable = false
