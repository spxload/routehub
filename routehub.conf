# =============================================================
# RouteHub — главный конфиг (routehub.conf)
# Точка входа. Раздаётся семье ОДНОЙ ссылкой (Loon Remote Config).
# Собран на Этапе C: ПЛАН_РЕАЛИЗАЦИИ_v3 (Раздел 6) + ЭТАП_B_РЕШЕНИЯ
#   + факты ЭТАП_A_РЕЗУЛЬТАТЫ. Состав подписки на 2026-06-04: 79 узлов
#   (62 [VPN] / 12 обход / 5 игры), все vless.
# Версия: C-draft-6, дата 2026-06-04.
#
# УЗЛЫ: берутся из секретного Gist, куда их кладёт сервер (publish_nodes.py)
#   с правильными заголовками. MitM и скрипт заголовков на телефоне больше
#   НЕ нужны. URL провайдера в конфиге отсутствует (он только в Secrets).
#   Порядок узлов: Германия первой, дальше страны по числу [VPN]-узлов
#   (видимая сортировка). grpc-узлы оставлены на будущее — Loon их пока
#   НЕ импортирует, поэтому в гисте узлов больше, чем видно в Loon (норма).
#
# ПРОВИЗОРНО — проверить на устройстве, зафиксировать в ЭТАП_A_РЕЗУЛЬТАТЫ:
#   * подписка из Gist грузится, узлы видны, фильтр [VPN] ловит ~62 (A.2).
#   * доступность gist.githubusercontent.com из сети РФ (A.5); если
#     блокируется — искать зеркало.
#   * disable-udp-ports=443 (QUIC) — сравнить YouTube с/без (A.7).
#   * internet-test-url — доступность напрямую в сети РФ.
# =============================================================

[General]
# --- IP / DNS ---
ip-mode = ipv4-only
allow-udp-proxy = true
udp-fallback-mode = REJECT
dns-server = system,1.1.1.1,77.88.8.8
doh-server = https://cloudflare-dns.com/dns-query,https://dns.google/dns-query
sni-sniffing = true
# --- Тестовые URL ---
proxy-test-url = http://cp.cloudflare.com/generate_204
internet-test-url = http://www.msftconnecttest.com/connecttest.txt
test-timeout = 3
interface-mode = auto
# --- QUIC: ПРОВИЗОРНО (A.7). Глушение UDP/443 заставляет QUIC-трафик
#     идти по TCP через прокси. Сравнить YouTube с этой строкой и без. ---
disable-udp-ports = 443
# --- Звонки: STUN НЕ глушить (disable-stun=false), иначе ломаются звонки ---
disable-stun = false
# --- real-ip: локальное + Apple (корректные iMessage/FaceTime, находка Н3) ---
real-ip = wpad.*,wpad,*.local,*.apple.com,*.icloud.com
# --- Не гонять локалку через Loon ---
skip-proxy = wpad.*,wpad,*.local,localhost,*.lan,*.localdomain
bypass-tun = 10.0.0.0/8,100.64.0.0/10,127.0.0.0/8,169.254.0.0/16,172.16.0.0/12,192.0.0.0/24,192.0.2.0/24,192.88.99.0/24,192.168.0.0/16,198.18.0.0/15,198.51.100.0/24,203.0.113.0/24,224.0.0.0/4,255.255.255.255/32
# ssid-trigger — добавляется на Этапе E (Wi-Fi/сотовая).

[Host]
# TikTok решается маршрутизацией доменов (Этап J), БЕЗ MITM и DNS-подмены.
# DNS по SSID — добавляется на Этапе E при необходимости.

[Remote Proxy]
# Узлы — из секретного Gist (сервер кладёт их туда с правильными заголовками,
# скрипт publish_nodes.py). Loon читает чистый список — без MitM и без скрипта
# заголовков. Ссылка-секрет (как раньше URL подписки): уровень доступа тот же,
# но загрузка надёжнее. Алиас оставлен "Lastdep" — на него ссылаются фильтры.
Lastdep = https://gist.githubusercontent.com/spxload/b14194982ad9d058c21d393d0f342147/raw/lastdep-nodes.txt,udp=true,enabled=true

[Remote Filter]
# Имя узла != реальная гео (A: «🇷🇺 Россия [VPN] #1» по GeoIP выходит в FI).
# Поэтому фильтр — только по ТИПУ узла (тег в имени). Страну для AI выбирает
# скрипт-селектор по серверному GeoIP (routehub-ratings.json, Этап D).
#
# ВАЖНО: фильтруем по ИНВАРИАНТНОМУ тегу [VPN]/[Обход]/[Игры], НЕ по эмодзи —
# провайдер часто меняет значки (🙏🚀💫…), а теги и страна неизменны.
# NameKeyword проще и надёжнее NameRegex, без кавычек
# (синтаксис — офиц. пример Loon0x00/LoonExampleConfig). Менять фильтр —
# правкой этой строки в GitHub: у всех (вкл. жену) подтянется автоматически.
#
# RH-Filter-Осн — основные VPN (тег [VPN], при любом эмодзи). ~62 узла. Пул для AI.
RH-Filter-Осн = NameKeyword, Lastdep, FilterKey = [VPN]
# RH-Filter-Игры — игровые узлы (низкая задержка). Для обычного трафика и звонков, НЕ для AI.
RH-Filter-Игры = NameKeyword, Lastdep, FilterKey = Игры
# RH-Filter-Обход — платные обходные ([Обход] и [Обход - МТС]). ~12 узлов.
RH-Filter-Обход = NameKeyword, Lastdep, FilterKey = Обход

[Proxy Group]
# --- AI: ОДНА группа-пул (решение Дианы, вар.А). ТОЛЬКО основные VPN (не игры,
#     не обход). Все 5 AI-сервисов идут через ОДИН узел, который назначает
#     cron-скрипт-селектор (Германия + 2 страны по числу узлов/скорости, Этап D).
#     Узел ВНУТРИ страны селектор выбирает по отклику И скорости закачки
#     (локальный спидтест, Этап H) — чтобы и пинг, и скорость были хорошими.
#     До запуска скрипта select берёт первый узел пула. Качество ИИ на конкретном
#     узле добивается кнопками «не работает» (локальное занижение, Этап D). ---
RH-AI = select, RH-Filter-Осн, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/AI.png
# --- Обычный трафик. СЕЙЧАС: url-test (выбор по ОТКЛИКУ).
#     РЕШЕНИЕ Дианы (вар.б, делать на Этапе D/H): основа станет SELECT, узел
#     назначает СПИДТЕСТ-скрипт по ОТКЛИКУ + СКОРОСТИ закачки (тот же скрипт,
#     что меряет скорость, — НЕ отдельный); health-скрипт следит за живостью.
#     Причина, почему не «приписать скорость к именам и fallback»: имена узлов
#     подписки неизменяемы, скорость локальна у каждого телефона, а список общий
#     -> выбор по скорости возможен ТОЛЬКО локально скриптом.
#     Пул = основные VPN + игровые (быстрые, безлимит). ---
RH-АВТО = url-test, RH-Filter-Осн, RH-Filter-Игры, url=http://cp.cloudflare.com/generate_204, interval=600, tolerance=150, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Auto.png
# --- Обходные узлы (whitelist РКН, Этап F): включаются только при блокировке ---
RH-Обход = fallback, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=300, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Bypass.png
# --- Звонки: автоматически. fallback берёт первый живой; игровые узлы поставлены
#     ПЕРВЫМИ (низкая задержка, хорошо для звонков, особенно по Wi-Fi), дальше —
#     основные VPN. Все vless поддерживают UDP. Уточнение стабильности — Этап I. ---
RH-Звонки = fallback, RH-Filter-Игры, RH-Filter-Осн, url=http://cp.cloudflare.com/generate_204, interval=300, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Available.png
# --- Apple: по умолчанию напрямую, при проблемах — через RH-АВТО ---
RH-Apple = select, DIRECT, RH-АВТО, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Apple.png

[Rule]
# === Порядок: частное -> общее, первое совпадение выигрывает ===
# Приоритет источников (docs 3.9): локальные правила > плагин > подписка.
# Критичное (Apple, AI) — здесь, в локальном [Rule].

# 1. Apple Push
IP-CIDR,17.0.0.0/8,RH-Apple,no-resolve

# 2. Локальные REJECT (мультикаст)
IP-CIDR,224.0.0.0/4,REJECT,no-resolve
IP-CIDR,239.0.0.0/8,REJECT,no-resolve

# 3. Звонки: STUN — установка голосовой связи (Н21). Домены/порты — Этап I.
PROTOCOL,STUN,RH-Звонки

# 4. AI-сервисы -> одна группа RH-AI
DOMAIN-SUFFIX,openai.com,RH-AI
DOMAIN-SUFFIX,chatgpt.com,RH-AI
DOMAIN-SUFFIX,oaistatic.com,RH-AI
DOMAIN-SUFFIX,oaiusercontent.com,RH-AI
DOMAIN-SUFFIX,anthropic.com,RH-AI
DOMAIN-SUFFIX,claude.ai,RH-AI
DOMAIN-SUFFIX,gemini.google.com,RH-AI
DOMAIN-SUFFIX,bard.google.com,RH-AI
DOMAIN-SUFFIX,aistudio.google.com,RH-AI
DOMAIN-SUFFIX,generativelanguage.googleapis.com,RH-AI
DOMAIN-SUFFIX,x.ai,RH-AI
DOMAIN-SUFFIX,grok.com,RH-AI
DOMAIN-SUFFIX,perplexity.ai,RH-AI

# 5. DeepSeek — напрямую из РФ
DOMAIN-SUFFIX,deepseek.com,DIRECT

# 6. YouTube / соцсети
DOMAIN-SUFFIX,youtube.com,RH-АВТО
DOMAIN-SUFFIX,googlevideo.com,RH-АВТО
DOMAIN-SUFFIX,instagram.com,RH-АВТО

# 7. Российские IP -> напрямую (по гео НАЗНАЧЕНИЯ, не по имени узла)
GEOIP,RU,DIRECT

# 8. Всё прочее
FINAL,RH-АВТО

[Remote Rule]
# Минимальный ПРОВЕРЕННЫЙ набор (Этап C). Полный — Этап F (5 шагов проверки).
# Метки: [OK] содержимое открыто и подтверждено; [?] источник живой, формат
# для Loon подтвердить на A.11.
#
# Реклама/трекеры -> REJECT-DROP (щадящий, НЕ REJECT). [OK]
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Privacy/Privacy.list, policy=REJECT-DROP, tag=Реклама-трекеры, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Privacy/Privacy_Domain.list, policy=REJECT-DROP, tag=Реклама-домены, enabled=true
# AI catch-all для редких сервисов -> RH-AI. [OK] (491 правило; тянет Stripe/PayPal — приемлемо)
https://raw.githubusercontent.com/viewer12/OverseasAI.list/main/rule/Loon/OverseasAI/OverseasAI.list, policy=RH-AI, tag=AI-catch-all, enabled=true
# Telegram -> RH-АВТО. [?]
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Telegram/Telegram.list, policy=RH-АВТО, tag=Telegram, enabled=true
# Apple -> RH-Apple. [?]
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Apple/Apple.list, policy=RH-Apple, tag=Apple, enabled=true
# Заблокировано в РФ (РКН режет наружу, Re:filter) -> RH-АВТО. [?]
https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/main/rules/domains_refilter.list, policy=RH-АВТО, tag=Заблокировано-в-РФ, enabled=true
# Банки / финсервисы РФ -> DIRECT. [?]
https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/main/rules/banking.list, policy=DIRECT, tag=Банки-РФ, enabled=true
# no-russia-hosts (сервисы сами режут RU-IP, вывод 5) — добавить на Этапе F
#   после подтверждения точного файла/формата для Loon (путь не выдумываю).

[URL Rewrite]

[Script]
# Скрипт заголовков подписки УБРАН — узлы теперь из Gist, header-подмена
# делается на сервере (publish_nodes.py). MitM на телефоне не нужен.
# Скрипты RouteHub — тела пишутся на Этапе D; пока ВЫКЛ (файлов ещё нет в репо).
# Один network-changed-диспетчер (И4). Таймауты 90-200с (И5).
# ПРИМ. (Этап D, вар.б): спидтест-скрипт после замера назначает узел не только
#   для AI, но и для RH-АВТО (по отклику + скорости).
cron "0 */30 * * * ?" script-path=routehub-core.js, timeout=120, tag=RH-Core, enabled=false
cron "0 */20 * * * ?" script-path=routehub-health.js, timeout=90, tag=RH-Health, enabled=false
cron "0 */10 2-6 * * ?" script-path=routehub-speedtest.js, timeout=200, tag=RH-Speed, enabled=false
network-changed script-path=routehub-netwatch.js, timeout=120, tag=RH-Net, enabled=false

[Plugin]
# Плагины RouteHub собираются на Этапах D+. BoxJs (просмотр) — опц., выкл.
# https://raw.githubusercontent.com/chavyleung/scripts/master/box/chavy.boxjs.plugin, tag=BoxJs, enabled=false

[MITM]
# Не используется: узлы из Gist, header-подмена на сервере. MitM на телефоне не нужен.
enable = false
