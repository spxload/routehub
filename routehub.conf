# =============================================================
# RouteHub — главный конфиг (routehub.conf)
# Точка входа. Раздаётся семье ОДНОЙ ссылкой (Loon Remote Config).
# Версия: C-draft-13, дата 2026-06-07.
#
# БАЗОВЫЙ режим — СКРИПТОВЫЙ: RH-AI = select, узел выбирает routehub-core.js
#   (Германия-якорь, sticky) + RH-Health + RH-Net. Пострановые непересекающие
#   фильтры дают группировку «страна за страной» в группе RH-AI.
#
# FALLBACK-вариант собирает WORKER из ЭТОГО ЖЕ файла (второй конфиг не держим):
#   при `?ai=fallback` ИЛИ флаге `ai_fallback`=true в devices.json Worker:
#     * RH-AI: select -> fallback (+ RH-Filter-Обход последним, url+interval);
#     * RH-Core/RH-Health/RH-Net -> enabled=false (их setSelectPolicy конфликтует
#       с fallback).
#   Уведомления о смене узла — НАТИВНЫЕ Loon (RH-AI-Watch не используется).
#   Линки: ?key=kN (скрипт), ?key=kN&ai=fallback (fallback).
#   Приоритет: явный ?ai= > флаг ai_fallback > скрипт.
#
# УЗЛЫ: из секретного Gist (publish_nodes.py). nodes-kN отсортирован Worker'ом
#   по скорости. script-path и Lastdep переписывает Worker; RH-Speed/RH-Net
#   получают argument=key|origin|opts.
#
# ПРОВИЗОРНО — проверить на устройстве:
#   * счётчики пострановых фильтров (пустые безвредны; уточнить набор стран);
#   * NameRegex с эмодзи и негативным lookahead (RH-Filter-Прочее);
#   * disable-udp-ports=443 (QUIC) vs YouTube (A.7).
# =============================================================

[General]
ip-mode = ipv4-only
allow-udp-proxy = true
udp-fallback-mode = REJECT
dns-server = system,1.1.1.1,77.88.8.8
doh-server = https://cloudflare-dns.com/dns-query,https://dns.google/dns-query
sni-sniffing = true
proxy-test-url = http://cp.cloudflare.com/generate_204
internet-test-url = http://www.msftconnecttest.com/connecttest.txt
test-timeout = 3
interface-mode = auto
disable-udp-ports = 443
disable-stun = false
real-ip = wpad.*,wpad,*.local,*.apple.com,*.icloud.com
skip-proxy = wpad.*,wpad,*.local,localhost,*.lan,*.localdomain
bypass-tun = 10.0.0.0/8,100.64.0.0/10,127.0.0.0/8,169.254.0.0/16,172.16.0.0/12,192.0.0.0/24,192.0.2.0/24,192.88.99.0/24,192.168.0.0/16,198.18.0.0/15,198.51.100.0/24,203.0.113.0/24,224.0.0.0/4,255.255.255.255/32
# ssid-trigger — решение ВС (Этап E): НЕ добавляем (на всех сетях нужен RULE).

[Host]
# TikTok — маршрутизацией доменов (Этап J), БЕЗ MITM/DNS-подмены.

[Remote Proxy]
Lastdep = https://gist.githubusercontent.com/spxload/b14194982ad9d058c21d393d0f342147/raw/lastdep-nodes.txt,udp=true,enabled=true

[Remote Filter]
# Фильтр по ИНВАРИАНТНОМУ тегу [VPN]/[Обход]/[Игры], НЕ по эмодзи.
RH-Filter-Осн = NameKeyword, Lastdep, FilterKey = [VPN]
RH-Filter-Игры = NameKeyword, Lastdep, FilterKey = Игры
RH-Filter-Обход = NameKeyword, Lastdep, FilterKey = Обход
# Пострановые НЕПЕРЕСЕКАЮЩИЕСЯ фильтры (партиция [VPN] по флагу провайдера
#   в начале имени). Набор стран ПРОВИЗОРНЫЙ — уточнить по счётчикам в Loon.
#   RH-Filter-Прочее ловит все прочие [VPN] (негативный lookahead), чтобы ни
#   один узел не потерялся.
RH-Filter-DE = NameRegex, Lastdep, FilterKey = 🇩🇪.*\[VPN\]
RH-Filter-NL = NameRegex, Lastdep, FilterKey = 🇳🇱.*\[VPN\]
RH-Filter-CH = NameRegex, Lastdep, FilterKey = 🇨🇭.*\[VPN\]
RH-Filter-FR = NameRegex, Lastdep, FilterKey = 🇫🇷.*\[VPN\]
RH-Filter-GB = NameRegex, Lastdep, FilterKey = 🇬🇧.*\[VPN\]
RH-Filter-Прочее = NameRegex, Lastdep, FilterKey = ^(?!.*(🇩🇪|🇳🇱|🇨🇭|🇫🇷|🇬🇧)).*\[VPN\]

[Proxy Group]
# --- AI: БАЗОВО select, узел назначает routehub-core.js (Германия-якорь, sticky).
#     Пострановые фильтры -> группировка «страна за страной» в списке.
#     Worker при ?ai=fallback/флаге заменит на fallback (+ обход последним). ---
RH-AI = select, RH-Filter-DE, RH-Filter-NL, RH-Filter-CH, RH-Filter-FR, RH-Filter-GB, RH-Filter-Прочее, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/AI.png
# --- Обычный трафик: FALLBACK по сортировке скорости (nodes-kN по download). ---
RH-АВТО = fallback, RH-Filter-Осн, RH-Filter-Игры, url=http://cp.cloudflare.com/generate_204, interval=300, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Auto.png
# --- Обходные узлы (whitelist РКН, Этап F): только при блокировке ---
RH-Обход = fallback, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=300, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Bypass.png
# --- Звонки: fallback, игровые первыми (низкая задержка), дальше VPN ---
RH-Звонки = fallback, RH-Filter-Игры, RH-Filter-Осн, url=http://cp.cloudflare.com/generate_204, interval=300, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Available.png
# --- Apple: по умолчанию напрямую, при проблемах — RH-АВТО ---
RH-Apple = select, DIRECT, RH-АВТО, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Apple.png
# --- РУЧНОЙ ТЕСТ: все узлы (VPN+Игры+Обход) для ручного выбора. ---
RH-Все = select, RH-Filter-Осн, RH-Filter-Игры, RH-Filter-Обход, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Static.png

[Rule]
# Apple Push
IP-CIDR,17.0.0.0/8,RH-Apple,no-resolve
# Локальные REJECT
IP-CIDR,224.0.0.0/4,REJECT,no-resolve
IP-CIDR,239.0.0.0/8,REJECT,no-resolve
# Звонки: STUN
PROTOCOL,STUN,RH-Звонки
# AI-сервисы -> RH-AI
DOMAIN-SUFFIX,openai.com,RH-AI
DOMAIN-SUFFIX,chatgpt.com,RH-AI
DOMAIN-SUFFIX,oaistatic.com,RH-AI
DOMAIN-SUFFIX,oaiusercontent.com,RH-AI
DOMAIN-SUFFIX,anthropic.com,RH-AI
DOMAIN-SUFFIX,claude.ai,RH-AI
DOMAIN-SUFFIX,gemini.google.com,RH-AI
DOMAIN-SUFFIX,bard.google.com,RH-AI
DOMAIN-SUFFIX,aistudio.google.com,RH-AI
DOMAIN-SUFFIX,generativelanguage.googleapis.com,RH-AI
DOMAIN-SUFFIX,x.ai,RH-AI
DOMAIN-SUFFIX,grok.com,RH-AI
DOMAIN-SUFFIX,perplexity.ai,RH-AI
# DeepSeek — напрямую
DOMAIN-SUFFIX,deepseek.com,DIRECT
# YouTube / соцсети
DOMAIN-SUFFIX,youtube.com,RH-АВТО
DOMAIN-SUFFIX,googlevideo.com,RH-АВТО
DOMAIN-SUFFIX,instagram.com,RH-АВТО
# Российские IP -> напрямую
GEOIP,RU,DIRECT
# Всё прочее
FINAL,RH-АВТО

[Remote Rule]
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Privacy/Privacy.list, policy=REJECT-DROP, tag=Реклама-трекеры, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Privacy/Privacy_Domain.list, policy=REJECT-DROP, tag=Реклама-домены, enabled=true
https://raw.githubusercontent.com/viewer12/OverseasAI.list/main/rule/Loon/OverseasAI/OverseasAI.list, policy=RH-AI, tag=AI-catch-all, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Telegram/Telegram.list, policy=RH-АВТО, tag=Telegram, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Apple/Apple.list, policy=RH-Apple, tag=Apple, enabled=true
https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/main/rules/domains_refilter.list, policy=RH-АВТО, tag=Заблокировано-в-РФ, enabled=true
https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/main/rules/banking.list, policy=DIRECT, tag=Банки-РФ, enabled=true

[URL Rewrite]

[Script]
# БАЗОВО — скриптовый режим: AI-селектор RH-Core + RH-Health + RH-Net включены.
#   В fallback-режиме Worker выставит им enabled=false (см. шапку).
#   Уведомления о смене AI-узла — нативные Loon (RH-AI-Watch не используется;
#   файл routehub-ai-watch.js оставлен в репо, но не подключён).
cron "0 */30 * * * ?" script-path=routehub-core.js, timeout=120, tag=RH-Core, enabled=true
cron "0 */5 * * * ?" script-path=routehub-health.js, timeout=90, tag=RH-Health, enabled=true
cron "0 */20 * * * ?" script-path=routehub-speedtest.js, timeout=200, tag=RH-Speed, enabled=true
network-changed script-path=routehub-netwatch.js, timeout=120, tag=RH-Net, enabled=true
generic script-path=routehub-ai-bad.js, tag=RH-AI-плохо, enabled=true, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Reject.png
generic script-path=routehub-viewer.js, tag=RH-Просмотр, enabled=true, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Info.png

[Plugin]
# Плагины RouteHub — Этапы D+. BoxJs опц., выкл.

[MITM]
enable = false
