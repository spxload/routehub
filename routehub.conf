# =============================================================
# RouteHub — главный конфиг (routehub.conf)
# Точка входа. Раздаётся ОДНОЙ живой ссылкой Worker (/config?key=kN).
# Версия: C-draft-28, дата 2026-06-14.
# C-draft-28 ОТНОСИТЕЛЬНО C-draft-27:
#   + routehub-faillog.js (ШАГ 1, лог упавших доменов). http-request БЕЗ MITM.
#     Регистрируется ВЫКЛЮЧЕННЫМ (enabled=false): включить в UI Loon ВМЕСТЕ с
#     настройкой фильтра запроса (Тип=CONNECT, Статус=«Не удалось», MITM выкл,
#     Скрипт=faillog). Без фильтра http-request дёргается на каждом запросе —
#     потому по умолчанию выкл, чтобы не молотить вхолостую.
#     Цель: собрать домены, что упали (как whoosh под whitelist), в rh_faillog;
#     дашборд (v0.4.9) показывает их и (ШАГ 2) даст перенос в личный список.
#     НЕ ловит Магнит (он не шлёт упавших запросов — молчит за плашкой VPN).
#   ~ Дашборд routehub-dash.js -> v0.4.9 (блок «Упавшие домены», диагностика).
# C-draft-27 ОТНОСИТЕЛЬНО C-draft-26:
#   ~ Детектор РКН (RH-RKN) cron 10 мин → 3 мин. Быстрее ловит whitelist.
#     «Мгновенно» в Loon невозможно (скрипты только по cron / network-changed,
#     постоянного фонового мониторинга нет). 3 мин — компромисс скорость/батарея;
#     мгновенный детект при смене сети уже даёт netwatch (network-changed).
#   Дашборд routehub-dash.js доведён до v0.4.2 (мутации отдают свежий HTML,
#     стиль A+B, честный чекер, переделанная История).
# C-draft-26 ОТНОСИТЕЛЬНО C-draft-25 (дашборд-этап):
#   ~ Домен дашборда routehub.io → rh.box. Причина: routehub.io в публичной зоне
#     занят и резолвится — Safari шёл на реальный сайт, http-перехват Loon не
#     срабатывал. rh.box не резолвится (нет такой A-записи) → запрос ВСЕГДА
#     перехватывает Loon. Меняется: [Host] (FakeIP), http-request паттерн в [Script].
#   + Личный список RH-RU (Worker /mylist?key=kN) в [Remote Rule], policy=RH-RU,
#     ВЫШЕ forg-lib whitelist. Worker подставляет URL вместо плейсхолдера ниже.
#     Назначение: домены из whitelist-списков, которым под whitelist нужен обход
#     (как whoosh). Пополняется кнопкой из дашборда (store→/addrule→KV).
#   + [Plugin]: RouteHub-Dash.plugin — визитка с #!homepage=http://rh.box
#     (пункт RouteHub с иконкой в списке плагинов Loon → переход на дашборд).
#   РЕШЕНО тестом T1 (2026-06-12, k1, Wi-Fi+сотовая): $httpClient ИГНОРИРУЕТ
#     параметр node (5 запросов через разные группы/DIRECT/фейк → один IP).
#     → проверка «жив на DIRECT» скриптом НЕВОЗМОЖНА; группа RH-ПробаDIRECT и
#     скрипт-сторож НЕ вводятся. Проверка доменов — HTML-fetch дашборда под
#     нужным режимом (под whitelist «нужен обход», под нормой «ожил»).
#     УТОЧНЕНО T6 (2026-06-13): node РАБОТАЕТ для имён УЗЛОВ (спидтест достоверен),
#     игнорируется только для имён ГРУПП. Детект РКН (rkn) на именах групп —
#     требует доработки (пробить по именам узлов); работает по общей недоступности.
# C-draft-25:
#   + Личные исключения (блок в [Rule], ВЫШЕ всего): домены, которые есть в
#     forg-lib whitelist (→ жёсткий DIRECT), но без обхода под whitelist НЕ
#     работают. Локальное правило бьёт remote-список (локальные > подписка).
#     Сейчас: whoosh.bike (самокаты Whoosh). Добавлять сюда новые по мере находок.
# C-draft-24:
#   ~ category-ru (мелкие банки) с жёсткого DIRECT → RH-RU (часть не в whitelist
#     РКН, на DIRECT под whitelist мертвы). Жёсткий DIRECT остаётся только у
#     гарантированно РКН-разрешённых: whitelist-domains, hxehex (+Сбер), whitelist-ips.
# C-draft-23 — МОДЕЛЬ «СЛАБЫЙ DIRECT ПО УМОЛЧАНИЮ»
#   (Этап F закрыт полевым тестом под whitelist 2026-06-12: Loon ПРОБИВАЕТ член
#    DIRECT в fallback url'ом → при недоступности DIRECT уходит на следующий член.
#    example.com и tbank.ru под whitelist ушли с DIRECT на обход и открылись.)
#   ~ RH-Главный: select → fallback, DIRECT, RH-АВТО. FINAL сюда. Норма: DIRECT
#     (быстро, меньше нагрузки на VPN, меньше бан-экспозиция). Whitelist: проба
#     DIRECT к зарубежному generate_204 падает → RH-АВТО (VPN→игры→обход).
#   + RH-RU = fallback, DIRECT, RH-Обход. Для GEOIP-RU и РФ-сервисов НЕ в whitelist
#     (tbank, мелкие банки, Apple, whoosh и т.п.): норма DIRECT, whitelist → обход.
#   − RH-Прямой УБРАН (переключаемый select заменён моделью).
#   − RH-Тест УБРАН (тест Этапа F выполнен).
#   ~ РКН-whitelist списки forg-lib (whitelist-domains, hxehex+Сбер, whitelist-ips)
#     → ЖЁСТКИЙ DIRECT. Обход для них ВРЕДЕН: вылезает «выключите ВПН», режутся
#     функции (анти-VPN сервиса). Эти домены в обход не пускать.
#   ~ Банки ЦБ + Apple-список + мелкие банки (category-ru) → RH-RU.
#   ~ GEOIP,RU / DeepSeek / Apple push (17.0.0.0/8) → RH-RU.
#   ~ ВСЕ fallback-группы: max-timeout=2000, interval=120. AI-группы строит Worker
#     (worker v1.6.0: тоже 120/2000). url пробы — ЗАРУБЕЖНЫЙ generate_204.
# --- История ниже (C-draft-22..18) ---
# C-draft-22: фикс дашборда — домен routehub.io (FakeIP), [Host] без петли.
# C-draft-21: локальный дашборд (routehub-dash.js http-request), RH-DashCache,
#   RH-RKN (детект режима), RH-Проба-VPN.
# C-draft-20: звонки — запасная ступень VPNне☎ (устранены дубли в RH-Звонки).
# C-draft-19: звонки по маркеру ☎ (voiceOk jit≤30/bl≤50/med≤160).
# C-draft-18: РФ→DIRECT слой forg-lib + банки ЦБ выше прокси-списков; hijack-dns=*:53;
#   domain-reject-mode=DNS; убран disable-udp-ports=443 (FaceTime); Яндекс plain-резерв.
#
# МОДЕЛЬ ОДНОЙ ПОДПИСКИ: Worker /nodes отдаёт оба набора (🛜/📱); каждая функция —
#   select-родитель из двух fallback-детей (-W/-C); netwatch флипает родителя по
#   сети. AI — страновые тиеры, СТРОИТ Worker. Выбор узла делает fallback.
# =============================================================

[General]
ip-mode = ipv4-only
allow-udp-proxy = true
udp-fallback-mode = REJECT
dns-server = system,1.1.1.1,77.88.8.8
doh-server = https://cloudflare-dns.com/dns-query,https://dns.google/dns-query
hijack-dns = *:53
domain-reject-mode = DNS
sni-sniffing = true
proxy-test-url = http://cp.cloudflare.com/generate_204
internet-test-url = http://www.msftconnecttest.com/connecttest.txt
test-timeout = 3
interface-mode = auto
disable-stun = false
real-ip = wpad.*,wpad,*.local,*.apple.com,*.icloud.com,time.*.com,ntp.*.com
skip-proxy = wpad.*,wpad,*.local,localhost,*.lan,*.localdomain,captive.apple.com
bypass-tun = 10.0.0.0/8,100.64.0.0/10,127.0.0.0/8,169.254.0.0/16,172.16.0.0/12,192.0.0.0/24,192.0.2.0/24,192.88.99.0/24,192.168.0.0/16,198.18.0.0/15,198.51.100.0/24,203.0.113.0/24,224.0.0.0/4,255.255.255.255/32
# disable-udp-ports — НЕ задаём (глушение UDP/443 ломало FaceTime/звонки).
# Яндекс DNS (77.88.8.8) — только plain-резерв, в doh-server НЕ добавлять (отравление РКН).

[Host]
# Дашборд rh.box — FakeIP, чтобы Safari не искал реальный домен; запрос
# перехватывает routehub-dash.js (http-request). Домен не резолвится в интернете.
rh.box = 198.18.0.1
# TikTok — маршрутизацией доменов (Этап J), без MITM/DNS-подмены.
# Опц.: точечный РФ-резолвинг через Яндекс — пример: *.gosuslugi.ru = server:77.88.8.8

[Remote Proxy]
# Одна подписка — Worker перепишет key/origin и отдаст оба набора (🛜+📱).
Lastdep = https://routehub.proton4iker.workers.dev/nodes?key=k1,udp=true,enabled=true

[Remote Filter]
# Разделение по сети — МЕТКОЙ в имени (🛜/📱), regex по метке.
RH-Filter-W-VPN  = NameRegex, Lastdep, FilterKey = \[VPN\].*🛜
RH-Filter-C-VPN  = NameRegex, Lastdep, FilterKey = \[VPN\].*📱
RH-Filter-W-Игры = NameRegex, Lastdep, FilterKey = Игры.*🛜
RH-Filter-C-Игры = NameRegex, Lastdep, FilterKey = Игры.*📱
RH-Filter-W-Звонки = NameRegex, Lastdep, FilterKey = 🛜.*☎
RH-Filter-C-Звонки = NameRegex, Lastdep, FilterKey = 📱.*☎
# VPN-узлы БЕЗ ☎ (запас для звонков, без дублей с ☎-фильтром)
RH-Filter-W-VPNне☎ = NameRegex, Lastdep, FilterKey = ^(?!.*☎).*\[VPN\].*🛜
RH-Filter-C-VPNне☎ = NameRegex, Lastdep, FilterKey = ^(?!.*☎).*\[VPN\].*📱
RH-Filter-Обход  = NameKeyword, Lastdep, FilterKey = Обход
# --- AI-тиеры (постраные) — СТРОИТ Worker по числу узлов, DE первой ---
# __RH_AI_FILTERS__

[Proxy Group]
# --- Ручные / служебные ---
RH-Все = select, RH-Filter-W-VPN, RH-Filter-W-Игры, RH-Filter-Обход, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Static.png
RH-Обход = fallback, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=120, max-timeout=2000, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Bypass.png
# Проб-группа детекта РКН (routehub-rkn): ТОЛЬКО VPN-узлы, без обходного хвоста —
# иначе падение VPN маскируется уходом в обход и whitelist не детектится.
RH-Проба-VPN = fallback, RH-Filter-W-VPN, RH-Filter-C-VPN, url=http://cp.cloudflare.com/generate_204, interval=120, max-timeout=2000, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Available.png
# --- Слабый DIRECT по умолчанию (Loon пробивает DIRECT в fallback — тест Этапа F) ---
# РФ-сервисы не в whitelist + GEOIP-RU: норма DIRECT, whitelist -> обход.
RH-RU = fallback, DIRECT, RH-Обход, url=http://cp.cloudflare.com/generate_204, interval=120, max-timeout=2000, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Direct.png
# FINAL: прочий иностранный — норма DIRECT, whitelist -> RH-АВТО (VPN->игры->обход).
RH-Главный = fallback, DIRECT, RH-АВТО, url=http://cp.cloudflare.com/generate_204, interval=120, max-timeout=2000, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Final.png
# --- AI: родитель select (netwatch флипает) + дети fallback. Тиеры строит Worker. ---
# __RH_AI_GROUPS__
# --- Обычный трафик: основа (VPN) -> игры -> обход ---
RH-АВТО = select, RH-АВТО-W, RH-АВТО-C, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Auto.png
RH-АВТО-W = fallback, RH-Filter-W-VPN, RH-Filter-W-Игры, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=120, max-timeout=2000
RH-АВТО-C = fallback, RH-Filter-C-VPN, RH-Filter-C-Игры, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=120, max-timeout=2000
# --- Звонки: голосовой маркер ☎ (jit/bl/med в норме) -> VPN-без-☎ -> обход ---
RH-Звонки = select, RH-Звонки-W, RH-Звонки-C, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Available.png
RH-Звонки-W = fallback, RH-Filter-W-Звонки, RH-Filter-W-VPNне☎, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=120, max-timeout=2000
RH-Звонки-C = fallback, RH-Filter-C-Звонки, RH-Filter-C-VPNне☎, RH-Filter-Обход, url=http://cp.cloudflare.com/generate_204, interval=120, max-timeout=2000

[Rule]
# --- ЛИЧНЫЕ ИСКЛЮЧЕНИЯ (выше всего): домены из whitelist-списков, которым нужен ---
# --- обход под whitelist. Локальное правило бьёт remote whitelist-DIRECT.       ---
# --- Добавлять сюда сервисы, что есть в forg-lib whitelist, но без обхода мертвы. ---
DOMAIN-SUFFIX,whoosh.bike,RH-RU
# Apple Push: норма DIRECT, whitelist -> обход (Apple под whitelist на DIRECT не идёт)
IP-CIDR,17.0.0.0/8,RH-RU,no-resolve
# Локальные REJECT
IP-CIDR,224.0.0.0/4,REJECT,no-resolve
IP-CIDR,239.0.0.0/8,REJECT,no-resolve
# Звонки: STUN
PROTOCOL,STUN,RH-Звонки
# AI-сервисы -> RH-AI (локальные правила приоритетнее подписок)
DOMAIN-SUFFIX,openai.com,RH-AI
DOMAIN-SUFFIX,chatgpt.com,RH-AI
DOMAIN-SUFFIX,oaistatic.com,RH-AI
DOMAIN-SUFFIX,oaiusercontent.com,RH-AI
DOMAIN-SUFFIX,anthropic.com,RH-AI
DOMAIN-SUFFIX,claude.ai,RH-AI
DOMAIN-SUFFIX,gemini.google.com,RH-AI
DOMAIN-SUFFIX,bard.google.com,RH-AI
DOMAIN-SUFFIX,aistudio.google.com,RH-AI
DOMAIN-SUFFIX,generativelanguage.googleapis.com,RH-AI
DOMAIN-SUFFIX,x.ai,RH-AI
DOMAIN-SUFFIX,grok.com,RH-AI
DOMAIN-SUFFIX,perplexity.ai,RH-AI
# DeepSeek: норма DIRECT, whitelist -> обход
DOMAIN-SUFFIX,deepseek.com,RH-RU
# YouTube / соцсети -> прокси
DOMAIN-SUFFIX,youtube.com,RH-АВТО
DOMAIN-SUFFIX,googlevideo.com,RH-АВТО
DOMAIN-SUFFIX,instagram.com,RH-АВТО
# Российские IP: норма DIRECT, whitelist -> обход (fallback для непойманного доменами)
GEOIP,RU,RH-RU
# Всё прочее -> RH-Главный (норма DIRECT, whitelist -> RH-АВТО)
FINAL,RH-Главный

[Remote Rule]
# --- Реклама/трекеры -> блок (ОПЦИЯ; стоит выше РФ-DIRECT, режет и РФ-трекеры) ---
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Privacy/Privacy.list, policy=REJECT-DROP, tag=Реклама-трекеры, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Privacy/Privacy_Domain.list, policy=REJECT-DROP, tag=Реклама-домены, enabled=true
# --- ЛИЧНЫЙ СПИСОК RH-RU (Worker /mylist) -> RH-RU. ВЫШЕ forg-lib whitelist:    ---
# --- домены здесь нужны в обход даже если whitelist-список ставит им DIRECT.     ---
# --- Пополняется кнопкой из дашборда. Worker подставит URL вместо плейсхолдера.   ---
# __RH_MYLIST_URL__, policy=RH-RU, tag=Личный-список-обход, enabled=true, update-interval=60
# --- РКН-whitelist (гарантированно РКН-разрешённые) -> ЖЁСТКИЙ DIRECT. Обход ВРЕДЕН (анти-VPN). ВЫШЕ остального РФ. ---
https://raw.githubusercontent.com/forg-lib-lov/roscomvpn-shadowrocket/main/lists/whitelist-domains.list, policy=DIRECT, tag=РФ-whitelist-домены, enabled=true
https://raw.githubusercontent.com/forg-lib-lov/roscomvpn-shadowrocket/main/lists/hxehex-whitelist.list, policy=DIRECT, tag=РФ-моб-whitelist-Сбер, enabled=true
https://raw.githubusercontent.com/forg-lib-lov/roscomvpn-shadowrocket/main/lists/whitelist-ips.list, policy=DIRECT, tag=РФ-whitelist-IP, enabled=true
# --- Мелкие банки + Apple + банки ЦБ -> RH-RU (норма DIRECT, whitelist -> обход). Не все в whitelist РКН. ---
https://raw.githubusercontent.com/forg-lib-lov/roscomvpn-shadowrocket/main/lists/category-ru.list, policy=RH-RU, tag=РФ-мелкие-банки, enabled=true
https://raw.githubusercontent.com/forg-lib-lov/roscomvpn-shadowrocket/main/lists/apple.list, policy=RH-RU, tag=Apple, enabled=true
https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/main/rules/domains_banking.list, policy=RH-RU, tag=Банки-ЦБ-РФ, enabled=true
# --- AI catch-all (ОПЦИЯ; локальные AI-правила выше всё равно приоритетнее) ---
https://raw.githubusercontent.com/viewer12/OverseasAI.list/main/rule/Loon/OverseasAI/OverseasAI.list, policy=RH-AI, tag=AI-catch-all, enabled=true
# --- Прокси (заблокированное в РФ) ---
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Telegram/Telegram.list, policy=RH-АВТО, tag=Telegram, enabled=true
https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/main/rules/domains_refilter.list, policy=RH-АВТО, tag=Заблокировано-в-РФ, enabled=true

[URL Rewrite]

[Script]
# Выбор узла делает fallback. Активны только спидтест и netwatch.
cron "0 */20 * * * ?" script-path=routehub-speedtest.js, timeout=200, tag=RH-Speed, enabled=true
# netwatch — флип родительских групп по сети + детект whitelist.
network-changed script-path=routehub-netwatch.js, timeout=120, tag=RH-Net, enabled=true
# routehub-viewer — ручной просмотр метрик узлов (запуск из раздела скриптов Loon).
generic script-path=routehub-viewer.js, tag=RH-Viewer, img-url=https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Available.png, enabled=true
# routehub-dash — перехват http://rh.box, отдаёт локальный HTML-дашборд (HTTP, без MITM).
http-request ^http:\/\/rh\.box script-path=routehub-dash.js, timeout=10, tag=RH-Dash, enabled=true
# routehub-dashcache — обновляет локальный кэш дашборда из Worker /dashboard.
cron "0 */15 * * * ?" script-path=routehub-dashcache.js, timeout=60, tag=RH-DashCache, enabled=true
# routehub-rkn — детект режима сети. cron 3 мин (C-draft-27): быстрее ловит whitelist;
# мгновенный детект при смене сети даёт netwatch. «Мгновенно» постоянно в Loon нельзя.
cron "0 */3 * * * ?" script-path=routehub-rkn.js, timeout=60, tag=RH-RKN, enabled=true
# routehub-faillog — лог упавших доменов (ШАГ 1). ВЫКЛ по умолчанию: включить в UI
# Loon ВМЕСТЕ с фильтром запроса (Тип=CONNECT, Статус=«Не удалось», MITM выкл,
# Скрипт=faillog). Без фильтра дёргается на каждом запросе. Пишет домены в rh_faillog.
http-request ^https?:\/\/ script-path=routehub-faillog.js, timeout=5, tag=RH-FailLog, enabled=false
# BoxJs опц., выкл.

[Plugin]
# Визитка дашборда: пункт RouteHub с иконкой в списке плагинов Loon, тап -> homepage -> дашборд.
https://raw.githubusercontent.com/spxload/routehub/main/RouteHub-Dash.plugin, enabled=true
# BoxJs опц., выкл.

[MITM]
enable = false
